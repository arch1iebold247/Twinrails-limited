<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link rel="stylesheet" href="styles.css">
<script defer src="script.js"></script>
</head>
<body>
<header>
<h1>All Products</h1>
</header>

<div class="products">
<div class="card">
<h3>Glow Serum</h3>
<p>$25</p>
<button onclick="addToCart('Glow Serum',25)">Add to Cart</button>
</div>

<div class="card">
<h3>Pink Cream</h3>
<p>$30</p>
<button onclick="addToCart('Pink Cream',30)">Add to Cart</button>
</div>

<div class="card">
<h3>Purple Mask</h3>
<p>$20</p>
<button onclick="addToCart('Purple Mask',20)">Add to Cart</button>
</div>
</div>

<div class="cart">
<h2>🛒 Cart</h2>
<ul id="cartItems"></ul>
<p id="total"></p>
<button onclick="checkout()">Checkout</button>
</div>

</body>
</html>
